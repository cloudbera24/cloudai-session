<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloud-AI Session Generator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 50px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 500px;
            width: 90%;
        }
        h1 {
            color: #667eea;
            margin-bottom: 10px;
        }
        .subtitle {
            color: #666;
            margin-bottom: 30px;
        }
        .btn-group {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .btn {
            padding: 15px 30px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            transition: transform 0.2s;
        }
        .btn:hover {
            transform: translateY(-2px);
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }
        .btn-secondary {
            background: #f0f0f0;
            color: #333;
        }
        .footer {
            margin-top: 30px;
            color: #999;
            font-size: 12px;
        }
        .badge {
            display: inline-block;
            background: #e0e7ff;
            color: #667eea;
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 12px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="badge">✨ CLOUD-AI SESSION GENERATOR</div>
        <h1>🔐 Generate Session ID</h1>
        <p class="subtitle">Get your Cloud-AI session in MEGA format</p>
        
        <div class="btn-group">
            <a href="/pair" class="btn btn-primary">📱 Pair Code</a>
            <a href="/qr" class="btn btn-secondary">📷 QR Code</a>
        </div>
        
        <div class="footer">
            <p>Format: <code>CLOUD-AI~fileID#decryptKey</code></p>
            <p>Compatible with Cloud-AI WhatsApp Bot</p>
        </div>
    </div>
</body>
</html>
