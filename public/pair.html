<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloud-AI Pair Code</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            max-width: 400px;
            width: 90%;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        h1 { color: #667eea; margin-bottom: 10px; }
        input {
            width: 100%;
            padding: 15px;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 16px;
            margin: 20px 0;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 15px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
        }
        button:disabled { opacity: 0.6; }
        .code {
            font-size: 32px;
            font-weight: bold;
            color: #667eea;
            margin: 20px 0;
        }
        .result { display: none; margin-top: 20px; }
        .error { color: red; display: none; margin: 10px 0; }
        .loader {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #fff;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔐 CLOUD-AI PAIR CODE</h1>
        <p>Enter your WhatsApp number (no + sign)</p>
        
        <input type="text" id="phone" placeholder="e.g., 254712345678">
        <button id="submit">GET CODE</button>
        
        <div class="error" id="error">Invalid phone number</div>
        
        <div class="result" id="result">
            <p>Your pairing code is:</p>
            <div class="code" id="pairCode"></div>
            <p>Enter this code in WhatsApp:<br>Settings → Linked Devices → Link with phone number</p>
        </div>
    </div>

    <script>
        const phone = document.getElementById('phone');
        const submit = document.getElementById('submit');
        const resultDiv = document.getElementById('result');
        const pairCodeDiv = document.getElementById('pairCode');
        const errorDiv = document.getElementById('error');

        submit.addEventListener('click', async () => {
            let number = phone.value.trim().replace(/\D/g, '');
            
            if (number.length < 10 || number.length > 15) {
                errorDiv.style.display = 'block';
                return;
            }
            
            errorDiv.style.display = 'none';
            submit.disabled = true;
            submit.innerHTML = '<span class="loader"></span> GENERATING...';
            
            try {
                const response = await fetch(`/code?number=${number}`);
                const data = await response.json();
                
                if (data.code) {
                    pairCodeDiv.textContent = data.code;
                    resultDiv.style.display = 'block';
                } else {
                    alert('Failed to get code');
                }
            } catch (err) {
                alert('Error: ' + err.message);
            } finally {
                submit.disabled = false;
                submit.innerHTML = 'GET CODE';
            }
        });
    </script>
</body>
</html>
